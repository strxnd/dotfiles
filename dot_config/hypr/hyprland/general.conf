# See https://wiki.hypr.land/Configuring/Variables/
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ffffffaa)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    # Snappy with motion blur - custom bezier curves
    # See https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = snappy,         0.05, 0.9,  0.1,  1.0    # Fast start, smooth land
    bezier = smoothSnap,     0.16, 1,    0.3,  1      # Motion blur effect
    bezier = overshot,       0.13, 0.99, 0.29, 1.1    # Slight overshoot for life
    bezier = fade,           0.25, 0.46, 0.45, 0.94   # Smooth fade

    # Scientifically optimized for 240Hz display
    # Target: 75-100ms animations (~2x faster than before)
    # Human eye tracking threshold + motion blur perception
    #           NAME,          ONOFF, SPEED, CURVE,      [STYLE]
    animation = windows,       1,     0.85,  smoothSnap, popin 98%
    animation = windowsIn,     1,     0.85,  overshot,   popin 98%
    animation = windowsOut,    1,     0.65,  snappy,     popin 98%
    animation = windowsMove,   1,     0.85,  smoothSnap

    animation = border,        1,     0.5,   snappy
    animation = borderangle,   1,     25,    snappy,     loop

    animation = fade,          1,     0.7,   fade
    animation = fadeIn,        1,     0.6,   fade
    animation = fadeOut,       1,     0.6,   fade
    animation = fadeSwitch,    1,     0.7,   fade
    animation = fadeShadow,    1,     0.7,   fade
    animation = fadeDim,       1,     0.7,   fade

    animation = layers,        1,     0.9,   overshot
    animation = layersIn,      1,     0.9,   overshot,   slide
    animation = layersOut,     1,     0.75,  snappy,     slide

    animation = workspaces,    1,     1,     smoothSnap, slide

    animation = specialWorkspace, 1,  1,     smoothSnap, slidevert
}

dwindle {
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_delay = 300
    repeat_rate = 50

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
  force_zero_scaling = true
}
