general {
    hide_cursor = true
    ignore_empty_input = true
    text_trim = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.45
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Dim overlay to keep the lock screen readable over any wallpaper.
shape {
    monitor =
    size = 440, 560
    color = rgba(0, 0, 0, 0.62)
    rounding = 24
    border_size = 2
    border_color = rgba(245, 245, 255, 0.95)
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(205, 214, 244, 1.0)
    font_size = 96
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, 125
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(186, 194, 222, 1.0)
    font_size = 16
    font_family = JetBrains Mono Nerd Font
    position = 0, 55
    halign = center
    valign = center
}

label {
    monitor =
    text =   locked
    color = rgba(127, 132, 156, 1.0)
    font_size = 13
    font_family = JetBrains Mono Nerd Font
    position = 0, 6
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 58
    outline_thickness = 2
    outer_color = rgba(180, 190, 254, 1.0)
    inner_color = rgba(0, 0, 0, 0.82)
    font_color = rgba(205, 214, 244, 1.0)
    check_color = rgba(137, 180, 250, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    capslock_color = rgba(249, 226, 175, 1.0)
    dots_size = 0.18
    dots_spacing = 0.32
    dots_center = true
    fade_on_empty = false
    placeholder_text = <span foreground="##bac2de"> $USER</span>
    fail_text = <span foreground="##f38ba8">authentication failed</span>
    hide_input = false
    rounding = 16
    position = 0, -92
    halign = center
    valign = center
}

label {
    monitor =
    text = type password to unlock
    color = rgba(127, 132, 156, 1.0)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, -150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$USER@$HOST"
    color = rgba(137, 180, 250, 0.95)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, -216
    halign = center
    valign = center
}
